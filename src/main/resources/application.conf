flink {
  kafka {
    brokers = "kafka:29092"
    brokers = ${?KAFKA_BROKERS}
    
    source-topic = "usage-events"
    consumer-group = "flink-realtime-aggs"
    
    sink-topics {
      tenant-aggs-1min = "tenant-aggs-1min"
      tenant-aggs-5min = "tenant-aggs-5min"
      user-aggs-1min = "user-aggs-1min"
      user-aggs-5min = "user-aggs-5min"
      alerts = "usage-alerts"
    }
  }
  
  redis {
    host = "redis"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
    ttl-seconds = 600  # 10 minutes
  }
  
  watermark {
    max-out-of-orderness-seconds = 2
    idle-source-timeout-seconds = 5
  }
  
  alerts {
    tenant-threshold-per-minute = 100000
    user-threshold-per-minute = 10000
  }
  
  checkpoint {
    interval-ms = 60000
    timeout-ms = 600000
    min-pause-ms = 10000
  }
  
  parallelism {
    source = 2       # Reduced for PoC cluster (2 taskmanagers × 8 slots = 16 total)
    aggregation = 2
    sink = 2
  }
}
